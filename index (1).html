<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Garias - Jogo da Velha Pro</title>
    <style>
        body { background: #2b2b2b; color: white; font-family: 'Segoe UI', sans-serif; text-align: center; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; margin: 0; }
        .header-game { margin-bottom: 20px; }
        h2 { color: #4a90e2; margin: 10px 0; }
        
        .scoreboard { display: flex; gap: 20px; font-weight: bold; font-size: 18px; background: #333; padding: 10px 20px; border-radius: 8px; border: 1px solid #4a90e2; margin-bottom: 15px; }
        .score-x { color: #2ecc71; }
        .score-o { color: #e74c3c; }

        .controls { margin-bottom: 15px; }
        .btn-mode { background: #6a1b9a; color: white; border: none; padding: 8px 15px; cursor: pointer; border-radius: 4px; font-weight: bold; }
        
        .board { display: grid; grid-template-columns: repeat(3, 100px); grid-template-rows: repeat(3, 100px); gap: 8px; }
        .cell { width: 100px; height: 100px; background: #3d3d3d; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 50px; font-weight: bold; cursor: pointer; transition: 0.2s; }
        .cell:hover { background: #4a4a4a; }
        .cell.x-color { color: #2ecc71; }
        .cell.o-color { color: #e74c3c; }

        #status { margin-top: 20px; font-size: 18px; color: #f1c40f; height: 25px; }
        .btn-reset { margin-top: 20px; padding: 12px 25px; background: #4a90e2; color: white; border: none; font-weight: bold; border-radius: 5px; cursor: pointer; }
    </style>
</head>
<body>

    <div class="header-game">
        <h2>JOGO DA VELHA</h2>
    </div>

    <div class="scoreboard">
        <div class="score-x">X: <span id="win-x">0</span></div>
        <div class="score-o">O: <span id="win-o">0</span></div>
    </div>

    <div class="controls">
        <button class="btn-mode" id="modeBtn" onclick="toggleMode()">MODO: CONTRA BOT</button>
    </div>

    <div class="board" id="board">
        <div class="cell" onclick="makeMove(0)"></div>
        <div class="cell" onclick="makeMove(1)"></div>
        <div class="cell" onclick="makeMove(2)"></div>
        <div class="cell" onclick="makeMove(3)"></div>
        <div class="cell" onclick="makeMove(4)"></div>
        <div class="cell" onclick="makeMove(5)"></div>
        <div class="cell" onclick="makeMove(6)"></div>
        <div class="cell" onclick="makeMove(7)"></div>
        <div class="cell" onclick="makeMove(8)"></div>
    </div>

    <div id="status">Sua vez (X)</div>
    <button class="btn-reset" onclick="resetGame()">Reiniciar Jogo</button>

    <script>
        let board = ["", "", "", "", "", "", "", "", ""];
        let currentPlayer = "X";
        let gameActive = true;
        let vsBot = true;
        let scoreX = 0;
        let scoreO = 0;

        const statusDisplay = document.getElementById('status');
        const cells = document.querySelectorAll('.cell');

        // Sons via código (Web Audio API)
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        function playSfx(freq, duration) {
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.frequency.value = freq;
            gain.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + duration);
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start();
            osc.stop(audioCtx.currentTime + duration);
        }

        function toggleMode() {
            vsBot = !vsBot;
            document.getElementById('modeBtn').innerText = vsBot ? "MODO: CONTRA BOT" : "MODO: LOCAL";
            resetGame();
        }

        function makeMove(index) {
            if (board[index] === "" && gameActive) {
                executeMove(index);
                
                if (vsBot && gameActive && currentPlayer === "O") {
                    setTimeout(botMove, 500);
                }
            }
        }

        function executeMove(index) {
            board[index] = currentPlayer;
            cells[index].innerText = currentPlayer;
            cells[index].classList.add(currentPlayer === "X" ? "x-color" : "o-color");
            playSfx(currentPlayer === "X" ? 400 : 300, 0.1);
            checkResult();
        }

        function botMove() {
            if (!gameActive) return;
            // Bot procura a primeira casa vazia (simples)
            let emptyCells = board.map((v, i) => v === "" ? i : null).filter(v => v !== null);
            if (emptyCells.length > 0) {
                let randomIdx = emptyCells[Math.floor(Math.random() * emptyCells.length)];
                executeMove(randomIdx);
            }
        }

        function checkResult() {
            const wins = [[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]];
            let won = false;

            for (let w of wins) {
                if (board[w[0]] && board[w[0]] === board[w[1]] && board[w[0]] === board[w[2]]) {
                    won = true;
                    break;
                }
            }

            if (won) {
                statusDisplay.innerText = `Jogador ${currentPlayer} Venceu!`;
                if (currentPlayer === "X") { scoreX++; document.getElementById('win-x').innerText = scoreX; }
                else { scoreO++; document.getElementById('win-o').innerText = scoreO; }
                playSfx(600, 0.4);
                gameActive = false;
                return;
            }

            if (!board.includes("")) {
                statusDisplay.innerText = "Empate!";
                playSfx(150, 0.3);
                gameActive = false;
                return;
            }

            currentPlayer = currentPlayer === "X" ? "O" : "X";
            statusDisplay.innerText = vsBot && currentPlayer === "O" ? "Garias pensando..." : `Vez do ${currentPlayer}`;
        }

        function resetGame() {
            board = ["", "", "", "", "", "", "", "", ""];
            currentPlayer = "X";
            gameActive = true;
            statusDisplay.innerText = "Sua vez (X)";
            cells.forEach(c => { c.innerText = ""; c.className = "cell"; });
            playSfx(200, 0.1);
        }
    </script>
</body>
</html>
